<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AudioConvert Pro</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<!-- Paystack -->
<script src="https://js.paystack.co/v1/inline.js"></script>

<style>
body{margin:0;font-family:Arial;background:#0b1220;color:white}

/* NAV */
nav{
  display:flex;
  justify-content:space-around;
  background:#111827;
  padding:10px;
  position:sticky;
  top:0;
}
nav button{
  background:none;
  border:none;
  color:white;
  font-weight:bold;
}

/* PAGES */
.page{display:none;padding:16px}
.active{display:block}

/* CARD */
.card{
  max-width:420px;
  margin:auto;
  background:#111827;
  padding:18px;
  border-radius:16px;
}

/* UI */
.upload{
  border:2px dashed #3b82f6;
  padding:22px;
  border-radius:12px;
  text-align:center;
  cursor:pointer;
}

button,select{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
}

.primary{background:#3b82f6;color:white;font-weight:bold}
.pro{background:#22c55e;color:white;font-weight:bold}

table{
  width:100%;
  border-collapse:collapse;
  font-size:12px;
}

td,th{
  border:1px solid #333;
  padding:6px;
}
th{background:#1f2937}
</style>
</head>

<body>

<!-- ================= NAV ================= -->
<nav>
  <button onclick="show('home')">Home</button>
  <button onclick="show('app')">App</button>
  <button onclick="show('admin')">Admin</button>
</nav>

<!-- ================= HOME ================= -->
<div id="home" class="page active">
  <div class="card">
    <h1>🎧 AudioConvert Pro</h1>
    <p>Convert audio instantly + SaaS system</p>
    <button class="primary" onclick="show('app')">Start Converting</button>
  </div>
</div>

<!-- ================= APP ================= -->
<div id="app" class="page">

<div class="card">

<h2>Converter</h2>

<div id="userBox">Loading...</div>

<div class="upload" id="uploadBox">📁 Upload</div>
<input type="file" id="fileInput" hidden>

<select id="format">
<option value="wav">MP3 → WAV</option>
<option value="mp3">M4A → MP3</option>
<option value="m4a">WAV → M4A</option>
</select>

<button class="primary" onclick="convert()">Convert</button>

<button class="pro" onclick="subscribe()">💎 Subscribe ₦2000</button>

<div id="status"></div>

<div id="refBox"></div>

<a id="downloadLink" style="display:none;"></a>

</div>
</div>

<!-- ================= ADMIN ================= -->
<div id="admin" class="page">

<div class="card">
<h2>🧠 Admin Dashboard</h2>

<div id="stats"></div>

<table>
<thead>
<tr>
<th>User</th>
<th>Plan</th>
<th>Used</th>
<th>Refs</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

</div>
</div>

<script>
/* ================= NAV ================= */
function show(page){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(page).classList.add('active');

  if(page==="admin") loadAdmin();
}

/* ================= FIREBASE ================= */
const firebaseConfig={
  apiKey:"YOUR_FIREBASE_KEY",
  authDomain:"YOUR_PROJECT.firebaseapp.com",
  projectId:"YOUR_PROJECT"
};

firebase.initializeApp(firebaseConfig);

const auth=firebase.auth();
const db=firebase.firestore();

let userId,userData;

/* ================= INIT USER ================= */
auth.signInAnonymously().then(async(res)=>{
  userId=res.user.uid;

  const ref=db.collection("users").doc(userId);
  const doc=await ref.get();

  if(!doc.exists){
    await ref.set({
      used:0,
      plan:"free",
      subscriptionActive:false,
      refCode:Math.random().toString(36).substring(2,8),
      referrals:0
    });
  }

  loadUser();
});

/* ================= LOAD USER ================= */
async function loadUser(){
  const doc=await db.collection("users").doc(userId).get();
  userData=doc.data();

  document.getElementById("userBox").innerText=
    userData.subscriptionActive?"💎 PRO":"🆓 FREE";

  document.getElementById("status").innerText=
    userData.subscriptionActive?"Unlimited":`${userData.used}/3`;

  document.getElementById("refBox").innerText=
    "🔗 " + window.location.origin + "?ref=" + userData.refCode;
}

/* ================= SUBSCRIPTION ================= */
function subscribe(){
  let handler=PaystackPop.setup({
    key:"YOUR_PAYSTACK_KEY",
    email:"user@email.com",
    amount:200000,
    currency:"NGN",

    callback:function(){
      alert("Payment sent. Waiting for activation (webhook)");
    }
  });

  handler.openIframe();
}

/* ================= LIMIT LOGIC ================= */
async function canUse(){
  const doc=await db.collection("users").doc(userId).get();
  userData=doc.data();

  return userData.subscriptionActive || userData.used<3;
}

/* ================= UPLOAD ================= */
document.getElementById("uploadBox").onclick=()=>{
  document.getElementById("fileInput").click();
};

/* ================= FFmpeg ================= */
const {createFFmpeg,fetchFile}=FFmpeg;
const ffmpeg=createFFmpeg({log:false});
let ready=false;

async function ensure(){
  if(!ready){
    await ffmpeg.load();
    ready=true;
  }
}

/* ================= CONVERT ================= */
async function convert(){

  if(!(await canUse())){
    alert("Upgrade required");
    return;
  }

  const file=document.getElementById("fileInput").files[0];
  if(!file)return alert("Upload file");

  await ensure();

  const input="in."+file.name.split(".").pop();
  const format=document.getElementById("format").value;

  let output,cmd;

  if(format==="wav"){
    output="out.wav";
    cmd=["-i",input,output];
  }

  if(format==="mp3"){
    output="out.mp3";
    cmd=["-i",input,"-c:a","libmp3lame",output];
  }

  if(format==="m4a"){
    output="out.m4a";
    cmd=["-i",input,"-c:a","aac",output];
  }

  ffmpeg.FS("writeFile",input,await fetchFile(file));
  await ffmpeg.run(...cmd);

  const data=ffmpeg.FS("readFile",output);

  const url=URL.createObjectURL(new Blob([data.buffer]));

  const link=document.getElementById("downloadLink");
  link.href=url;
  link.download=output;
  link.innerText="⬇ Download";
  link.style.display="block";

  if(!userData.subscriptionActive){
    await db.collection("users").doc(userId).update({
      used:userData.used+1
    });
  }

  loadUser();
}

/* ================= ADMIN ================= */
async function loadAdmin(){
  const snap=await db.collection("users").get();

  let total=0,pro=0,free=0;
  let rows="";

  snap.forEach(d=>{
    let u=d.data();
    total++;
    u.subscriptionActive?pro++:free++;

    rows+=`
    <tr>
      <td>${d.id.slice(0,6)}</td>
      <td>${u.subscriptionActive?"PRO":"FREE"}</td>
      <td>${u.used}</td>
      <td>${u.referrals||0}</td>
    </tr>`;
  });

  document.getElementById("stats").innerText=
    `Users: ${total} | Pro: ${pro} | Free: ${free}`;

  document.getElementById("table").innerHTML=rows;
}
</script>

</body>
</html>
